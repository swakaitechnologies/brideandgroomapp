service: bride-groom-backend

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    NODE_ENV: production
    PORT: 5000
    JWT_SECRET: ${env:JWT_SECRET, ''}
    REFRESH_TOKEN_SECRET: ${env:REFRESH_TOKEN_SECRET, ''}
    DB_NAME: ${env:DB_NAME, ''}
    DB_USER: ${env:DB_USER, ''}
    DB_PASSWORD: ${env:DB_PASSWORD, ''}
    DB_HOST: ${env:DB_HOST, ''}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_DIALECT: ${env:DB_DIALECT, 'postgres'}
    DATABASE_URL: ${env:DATABASE_URL, ''}
    REDIS_URL: ${env:REDIS_URL, ''}
    INTERNAL_API_SECRET: ${env:INTERNAL_API_SECRET, ''}
    APP_AWS_ACCESS_KEY_ID: ${env:AWS_ACCESS_KEY_ID, ''}
    APP_AWS_SECRET_ACCESS_KEY: ${env:AWS_SECRET_ACCESS_KEY, ''}
    APP_AWS_REGION: ${env:AWS_REGION, 'us-east-1'}
    AWS_BUCKET: ${env:AWS_BUCKET, ''}
    FIREBASE_SERVICE_ACCOUNT: ${env:FIREBASE_SERVICE_ACCOUNT, ''}

package:
  patterns:
    - '!minio_data/**'
    - '!uploads/**'
    - '!logs/**'
    - '!scratch/**'
    - '!.serverless/**'
    - '!*.js'
    - 'lambda.js'
    - '!node_modules/**/*.md'
    - '!node_modules/**/*.txt'
    - '!node_modules/**/*.map'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/docs/**'
    - '!node_modules/**/examples/**'

functions:
  api:
    handler: lambda.handler
    events:
      - httpApi:
          path: '*'
          method: '*'

  websocket:
    handler: lambda.webSocketHandler
    events:
      - websocket:
          route: $connect
      - websocket:
          route: $disconnect
      - websocket:
          route: $default

plugins:
  - serverless-offline
