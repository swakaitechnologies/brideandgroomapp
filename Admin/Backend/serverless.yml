service: bride-groom-admin-backend

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    NODE_ENV: production
    ADMIN_PORT: 5001
    ADMIN_JWT_SECRET: ${env:ADMIN_JWT_SECRET, ''}
    DB_NAME: ${env:DB_NAME, ''}
    DB_USER: ${env:DB_USER, ''}
    DB_PASSWORD: ${env:DB_PASSWORD, ''}
    DB_HOST: ${env:DB_HOST, ''}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_DIALECT: ${env:DB_DIALECT, 'postgres'}
    DATABASE_URL: ${env:DATABASE_URL, ''}
    REDIS_URL: ${env:REDIS_URL, ''}
    BACKEND_URL: ${env:BACKEND_URL, ''}
    INTERNAL_API_SECRET: ${env:INTERNAL_API_SECRET, ''}
    APP_AWS_ACCESS_KEY_ID: ${env:AWS_ACCESS_KEY_ID, ''}
    APP_AWS_SECRET_ACCESS_KEY: ${env:AWS_SECRET_ACCESS_KEY, ''}
    APP_AWS_REGION: ${env:AWS_REGION, 'us-east-1'}
    AWS_BUCKET: ${env:AWS_BUCKET, ''}

package:
  patterns:
    - '!minio_data/**'
    - '!uploads/**'
    - '!logs/**'
    - '!scratch/**'
    - '!.serverless/**'
    - '!*.js'
    - 'lambda.js'

functions:
  api:
    handler: lambda.handler
    events:
      - httpApi:
          path: '*'
          method: '*'

plugins:
  - serverless-offline
