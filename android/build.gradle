buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.2.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects { prj ->
    def configureKotlinTarget = {
        if (prj.hasProperty("android")) {
            prj.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                def javaTarget = prj.android.compileOptions.targetCompatibility.toString()
                kotlinOptions {
                    jvmTarget = javaTarget
                }
            }
        }
    }

    if (prj.state.executed) {
        configureKotlinTarget()
    } else {
        prj.afterEvaluate {
            configureKotlinTarget()
        }
    }
}
